version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm ci
    build:
      commands:
        - npm run build
        - mkdir -p dist/.amplify-hosting
        - cp .amplify-hosting/deploy-manifest.json dist/.amplify-hosting/deploy-manifest.json
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
